<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10.0, user-scalable=yes">
<title>ScreenWiseATX Flyer</title>
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    background: #0f172a;
  }

  body {
    overflow: hidden;
  }

  .flyer-frame {
    width: 100vw;
    height: 100vh;
    border: 0;
    display: block;
    background: #0f172a;
  }

</style>
</head>
<body>
<script>
  const pdfUrl = "../ScreenWiseATXFlyer.pdf#toolbar=1&navpanes=1&scrollbar=1&view=FitH";
  const useNativePdfViewer = window.matchMedia("(max-width: 900px), (pointer: coarse)").matches;
  if (useNativePdfViewer) {
    window.location.replace(pdfUrl);
  }
</script>
<iframe
  class="flyer-frame"
  src="../ScreenWiseATXFlyer.pdf#toolbar=1&navpanes=1&scrollbar=1&view=FitH"
  title="ScreenWiseATX Flyer PDF">
</iframe>
</body>
</html>
